[[dashboard.metrics]]
label = "Queue Size"
memory_key = "twitter_hand_queue_size"
format = "number"

[[dashboard.metrics]]
label = "Engagement Rate"
memory_key = "twitter_hand_engagement_rate"
format = "percentage"
