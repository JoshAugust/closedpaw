format = "duration"

[[dashboard.metrics]]
label = "Published to Telegram"
memory_key = "clip_hand_clips_published_telegram"
format = "number"

[[dashboard.metrics]]
label = "Published to WhatsApp"
memory_key = "clip_hand_clips_published_whatsapp"
format = "number"
